name: Surveillance Prospects

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: surveillance-prospects
  cancel-in-progress: true

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download last line (if exists)
        uses: actions/download-artifact@v4
        with:
          name: progression
          path: .
        continue-on-error: true
      
      - name: Run surveillance script
        run: python Prospect.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      
      - name: Upload last line
        uses: actions/upload-artifact@v4
        with:
          name: progression
          path: |
            derniere_ligne.txt
            derniere_ligne.txt_last
            derniere_ligne.txt.json
      
      - name: Upload CSV export
        uses: actions/upload-artifact@v4
        with:
          name: prospects-export
          path: prospects_export_*.csv
